<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Tela de Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <a href="/"><button>Voltar ao inicio</button></a>
    </head>
    <body>
        <style>
    div{
        font-size: 40px;        
         text-align: center;
         padding-bottom: 40px;
         
    }
    form{
        font-size: 40px;
        text-align: center;
        padding: 40px;
        box-sizing: content-box;
        border: 1px solid #200;
        border-radius: 10px;
        background-color:#999999;
        border-width: 200px;
        border-color: #ffffff;   
    }
    button{
        color:#ffffff;
        font-size: 30px;
        background-color: #000000;
        border-radius: 10px;
    }
        </style>
        <div>LOGIN</div>
        <form th:action="@{/logar}" th:object="${credenciais}" method="post">
            <label>Email:</label>
            <input type="email" th:field="*{email}"/><br/>
            <label>Senha:</label>
            <input type="password" th:field="*{senha}"/><br/>
            <button type="submit">Logar</button>
        </form>
        <div>
            <a href="./registrar"><button>Se não tiver login registrar</button></a>
        </div>
    </body>
</html>
