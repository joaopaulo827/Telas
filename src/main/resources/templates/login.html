<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Tela de Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>

            body{
                margin: 0;
                padding: 0;
                height: 100vh;

                display: flex;
                justify-content: center;
                align-items: center;

                background-color: #f2f2f2;
                font-family: Arial, sans-serif;
            }

            .container{
                text-align: center;
            }

            h1{
                font-size: 40px;
                margin-bottom: 20px;
            }

            form{
                background-color: #999999;
                padding: 40px;
                border-radius: 10px;
                box-shadow: 0px 0px 10px rgba(0,0,0,0.3);
                width: 350px;
            }

            label{
                display: block;
                font-size: 20px;
                margin-top: 15px;
            }

            input{
                width: 100%;
                padding: 10px;
                margin-top: 5px;
                font-size: 18px;
                border-radius: 5px;
                border: 1px solid #ccc;
                box-sizing: border-box;
            }

            button{
                margin-top: 20px;
                padding: 10px 20px;
                font-size: 18px;
                border: none;
                border-radius: 8px;
                background-color: black;
                color: white;
                cursor: pointer;
            }

            button:hover{
                background-color: #333333;
            }

            .links{
                margin-top: 15px;
            }

            a{
                text-decoration: none;
            }

        </style>
    </head>

    <body>

        <div class="container">

            <div class="links">
                <a href="/">
                    <button type="button">Voltar ao início</button>
                </a>
            </div>

            <h1>LOGIN</h1>

            <form th:action="@{/logar}" 
                  th:object="${credenciais}" 
                  method="post">

                <label>Email:</label>
                <input type="email" th:field="*{email}" required>

                <label>Senha:</label>
                <input type="password" th:field="*{senha}" required>

                <button type="submit">Logar</button>

            </form>

            <div class="links">
                <a href="/registrar">
                    <button type="button">
                        Se não tiver login, registrar
                    </button>
                </a>
            </div>

        </div>

    </body>
</html>
