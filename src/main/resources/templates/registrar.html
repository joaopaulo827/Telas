<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Tela para registrar usuario</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <a href="./login"><button>Voltar ao login</button></a>
    </head>
    <body>
        <style>
        h2{
        font-size: 40px;
        text-align: center;
        
    }
    form{
       
        font-size: 40px;
        text-align: center;
        padding: 40px;
        box-sizing: content-box;
        border: 1px solid #200;
        border-radius: 10px;
        background-color:#999999;
        border-width: 150px;
        border-color: #ffffff;
    }
    button{
        color:#ffffff;
        font-size: 30px;
        background-color: #000000;
        border-radius: 10px;
    }
        </style>
        <h2>REGISTRAR</h2>
        <form th:action="@{/registrar}" 
              th:object="${user}" method="post">            
            <label>Nome:</label>
            <input type="text" th:field="*{nome}" placeholder="Lambarildo" />            
            <br/><br/>
            <label>Email:</label>
             <input type="email" th:field="*{email}" placeholder="Lambarildo.peixe@hotmail.com" />            
            <br/><br/>
            <label>Senha:</label>
             <input type="password" th:field="*{senha}"/>
            <br/><br/>
            <button type="submit"> Cadastrar</button>
        </form>
</div>
    
    </body>
</html>
